services:
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    command:
      - uvicorn
      - services.orchestrator.app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/workspace
